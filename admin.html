<!DOCTYPE html>
<html>

<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="fade-page">

    <header>
        <h1>Admin Menu Editor</h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
        </nav>

    </header>

    <section class="admin-panel">

        <h2>Add Menu Item</h2>

        <input id="admin-pass" type="password" placeholder="Admin Password">

        <input id="food-name" placeholder="Food Name">

        <input id="food-price" placeholder="Price">

        <select id="food-category">
            <option value="coffee">Coffee</option>
            <option value="snacks">Snacks</option>
            <option value="dessert">Dessert</option>
        </select>

        <input id="food-img" placeholder="Image URL">

        <button onclick="addMenuItem()">Add Item</button>

    </section>

</body>

<script src="script.js"></script>

</html>
